body:
  text: 治河圖略地理類四河渠之屬提要臣等謹案治河圖略一卷元王喜撰喜爵里無考其書首列六圖末各系以說而附所為治河方略及厯代決河總論二篇於後其文稱臣謹叙臣謹論云云疑為經進之本考元史順帝紀及河渠志至正中河決白茅堤大臣訪求治河方略喜書其作於是時歟其大㫖取李尋因其自然之說惟以浚新復舊為主厥後卒用賈魯之䇿疏塞並舉挽河東行以復故道與是編持論相合則當時固已採録其言矣特史文闕略未著其進書本末耳卷中所圖河源頗多訛舛蓋崑崙星宿逺隔窮荒自我國家底定西陲葱嶺于闐悉歸版籍於是河有重源之蹟始確然得其明徴元人所述憑潘昻霄之所記昻霄所說憑篤什案篤什舊作都實今改正之所傳輾轉相沿率由耳食撰元史者且全録其文於河渠志以為亘古所未聞喜之踵訛襲謬又何怪乎取其經略之詳而置其考據之疏可也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書治河圖略元王喜撰臣竊謂水之在天下有自然之利亦有自然之害順而導之者易為力逆而遏之者難為功譬猶人之一身血脉流通則無病血脉壅滯則病生審而治之宣其壅滯使之流通則病自去治水之道亦當如此竊見比年以來黃河失道泛濫曹濮間生民墊溺中原雕耗莫此為甚以致上干宵旰之憂勤次勞廟堂之軫念見者聞者莫不惻然思有以救之然未有出一謀建一策有補於明時者以其但知河之為害而未知其所以為害臣故歷考纍代河流變遷之故與浚治之術粗得其詳而知其有無不可為之理且何以言之皆緣下流壅滯水勢不能自泄是以决溢為害為今之計莫若浚入淮舊河于南以順其流仍導一新河于北以分其勢大河既分其流自緩無泛濫之患矣禹之播九河漢之浚屯氏宋之導清河于南北者即此道也猶百鈞之物一人舉之則力不能勝兩人舉之則力有餘此理甚明可舉而行今將禹河漢河宋河今河圖陳于左以備睿覽有以考擇庶幾拯溺之一助云臣謹叙臣謹按禹河自于闐葱嶺兩源合流東注蒲昌海潜行南出積石經龍門三千里而至於華隂又自南而東至于底柱孟津洛汭大伾又自東而北過洚水大陸迤邐北行至冀東兖北分播于九河趨碣石入海由是觀之氣分則緩勢分則弱禹所以治河之法行水之道其功皆在於九河之播也臣謹按漢河自孟津底柱以上河行地中無所變遷自大伾以下河高於地易於泛濫自周定王時已徙故瀆及漢元光間改向頓邱東北流經濮濟從樂陵入海文帝時决酸棗武帝時决瓠子皆在今濮陽縣遂通淮泗又漢溝洫志河决館陶在今濮州分為屯氏河在今大名路北流入海其河深廣與大河等蓋亦因其自决之勢就浚此河以泄大河故無復有泛溢之患繇是觀之河之下流壅則塞泄則平漢之所以能息菑弭患者其功専在於屯氏之分也臣謹按宋河自建紹按建隆紹聖相距百四十年南渡建炎紹興黃河北屬金界唯紹聖至建中靖國初中間才五六年宋河渠志載議河事最多疑為紹建之誤後仿此浚黃河决入巨野溢于泗以入淮謂之南清河由汶合濟至滄州入海謂之北清河初禹導濟水出河之南東入菏澤即今之梁山泊也南通淮泗北從千乘入海宋河既徙濟寧之巨野與濟遂合于一分而為南北流矣又濟之上流舊有莨蕩渠漢明帝使王景浚之東注浚儀南逹于淮即隋唐之汴口也金末河决開封則又因汴南流而入於淮矣今其决於曹濮復有合濟之勢臣愚所以參之於古審之於今而知其有必合之理也臣謹按今河自金末從開封北衛州决入渦河南流即今之過徐州而入淮者是也比年以來河水泛溢于曹濮而入淮舊河淤塞不通將有入御河之勢又未得其道以致數郡墊溺為害不小竊料新塞河道沙土尚虛但浚治稍深則水復故道下流自順非比無源之水假强鑿之難勞而無功也又計今新决河水散漫無統未有歸一以致橫流若舊河既浚水勢自减然後因其橫流所穿之徑順其北流之勢加之疏導别為一川則用力寡而見功疾此可為永久之利也臣謹謂治河之法必先浚入淮舊河使水南流復於故道次導入濟新河分半水北流以殺其勢此上策也今汴城之東黃河南岸列渠口數十皆是古時引水注于陳亳宋潁之郊以泄水怒又東至杞縣有三汊河口往年歸德太康兩處將南北兩汊堵閉不通使三汊之水總于一河安得不致决溢哉世祖皇帝嘗設置分監委任都水馬和之郭若思疏决新河之水導黃流由安山抵臨清接御河相地形設閘隄通漕運遂成千載之功今所以導新河北流者即馬都水之成法也蓋河之末流水勢浩大非一川能容不浚則勢不順不分則患不息是皆歷代已行之明效而非一口之空言臣故圖此以見其有可行之理耳臣謹按河源自吐蕃朵甘思西鄙方七八十里有泉百餘泓躡髙山下瞰燦若列星故名鄂敦即星宿海也東滙于澤又東為齊必勒一水西來名伊爾齊一水南來名呼蘭一水東南來名伊拉齊合流名都古爾納是為黃河又東岐為九渡尚清淺可涉又東五百里始混濁奔悍又三千里合二水折西經錫哩達崑崙山之隂四時積雪又北東至貴德州𨽻河州吐蕃等處宣慰司所轄然後抵積石與禹貢導積石者合上去星宿海蓋六千七百餘里此據世祖皇帝至元十七年遣招討使篤什親歷而言臣所以併紀此圖以知河源之逺宜其末流之盛大而難制也治河方略臣竊謂水之為利生民之所不可缺有國之所不可無關於利害至重矣歷代之虞衡水部本朝之都水監所以總天下之水而重其事也而黃河之水又天下之至大者今其决溢為害下病生民上纍國家不可視為尋常細事明矣必也重其事委重於大臣旁求良策而後可以息菑弭患臣雖不敏既圖敶于前復謂所以息菑弭患者必本於理勢之自然而其要則在於浚舊河導新河二者而已所以能息菑弭患者又必仰於人力之使然而其要則在于專委任優工役二者而已故敢以四事條列于後一先浚舊河合於上流淤塞處約以十里二十里為率挑出沙土令深或底下見流沙則縛木簰平置沙面為河水立腳之地仍於兩旁立桔橰長竿提出沙土漸淘漸洗使水得行上流既通則下流自然淹淹有建瓴之勢不待施工而自順若河水已循故道或可使之全流入淮則于决河北岸用竹絡木匱等盛石塊壘成河堤雖非久逺之計亦可救患于一時故不如因其自决之勢分為兩道最為得宜要在察其逆順審其形勢隨宜量度之耳議者莫不以為舊河沙土壅積如此之高新决河水如此之深豈能使之復於故道此自今日所見之勢而言也然所積沙土高者雖有一丈以來低者不下五七尺皆是近年淤積非天生堅頑之物固可以人力去之况其下既有流沙乃是水脉尚通與决河相平故其餘流浸漬特以沙土壅隔不得流耳浚而治之必有成功是皆他日未形之勢人所未見者也因謂龍門萬仞之顛四山皆石禹尚以人力鑿之以通河道况今河行平地沙土之中决諸東方則東流决諸西方則西流者乎此臣斷斷以為舊河有可浚之理也一後導新河浚舊河則始上流導新河則始下流蓋舊河既浚河流既分泛濫之水漸平却於下流因其所穿之徑順其勢導一川從北清河入梁山泊合御河入海又分一道入南清河合泗水入淮如此則南北閘河水增舟順可無啓閉之勞而國家永享其利抑且桑土悉平可以耕藝有倍收之獲而民蒙其利議者莫不以為大河入梁山泊則必衝壞閘河直趨東平為害不小殊不知河流既分力弱勢緩不足為害且以舊事證之前宋建紹時曾從濟寧巨野决入其時全河入于濟水下流分為二道一道從南清河入淮一道從北清河入海尚且不聞其破閘河害東平也况今於上流已分半水入汴河其一半入濟水者又分為南北流則入于梁山泊者僅四之一耳而梁山泊八百里之寬足以渟蓄其怒波則下流自然平緩可保其無患矣此臣斷斷以為新河有可導之理也一專委任宜選在朝明達大臣一員充總領河防使一應河道合干事務便宜行事仍選有學識有材幹之士以為之屬同心講究務在兼採衆長取人為善參酌審量底於功成至如董工役備器物司出納掌簿書則各有司存一優工役宜募民擇丁壯者為河夫十人為甲前期給散雇工錢必令稍優使之樂從盡力工作其有不趨事者罰及甲長仍禁有司毋得因而差發騷擾重困一方其鐡匠木匠則常用製造器具不致乏用至如醫工亦所不可缺者或河夫疾病傷損必官為醫療仍給半糧優恤之凡連年被水菑去處亦須賑贍之使得以復業歷代决河總論臣竊謂洪水之害莫甚於河治水之功莫難於河鑿龍門于上以疏其源播九河于下以殺其流者大禹敷治之功也蓋源疏則水性順流殺則水勢分臣所謂分河之說實原于此自禹功一立地平天成垂七百七十餘載無復為患及商之祖乙始圯于耿而河之經流固未嘗改也又九百四十餘載至周定王之五年河徙砱礫乃改其故瀆春秋戰國各私其地壅防百川以鄰為壑故葵邱之會有曲防之戒意者九河或湮或塞皆在此時以及漢之文帝决酸棗潰金隄嘗興卒塞之矣武帝時徙頓邱决濮陽瓠子遂通淮泗泛郡十六害及梁楚雖發卒十萬塞之輒復橫潰上去周定王又四百九十二年然後益徙而東田蚡乃狃於私田之利以為江河之决皆天事未易以人力强塞由是二十年置弗治及東封泰山臨决河沉白馬玉璧率羣臣負薪填决河築宣防導河北行浚屯氏以分大河使復禹舊跡八十年不為害此則分河之明效也成帝時馮逡奏言屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖高增隄防終不能泄九河今既難明請浚屯氏河以助大河泄暴水備非常而丞相御史不以為意後果大雨水决金隄灌四郡三十二縣百姓皆墊溺敗壞官亭室廬且四萬區蓋屯氏一塞下流不利以致為害此其驗也尋遣王延世為河防使者以竹絡長四丈大九圍盛以小石兩船夾載而下之三十二日隄成按前漢書作三十六日河隄成其後李尋議以為常欲求索九河故道而穿之今且因其自决勿塞以觀水勢河欲居之當自成川挑出沙土然後順天心而圖之必有成功而用力寡遂止不治朝臣以為百姓可哀遣使者據業賑贍之按前漢書據業作處業師古曰處業使安處之得居其業乃求能浚川者於是賈讓言治河有三策大㫖以為土之有川猶人之有口治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故善為川者决之使道善為民者宣之使言宜徙民放河北流入海出治隄之費以業所徙之民勿與水爭地此功一立千載無患此上策也多穿漕渠於冀地使民得以溉田分殺水怒雖非聖人法然亦救敗之術此中䇿也若乃繕完故隄增卑培薄勞費無已數逢其害此下䇿也自今觀之李尋之言最為近理今所謂因其自决之勢順其自然之性别導一川者即其說也至如賈讓之䇿似若可取熟而審之則有未然者其曰徙民放河置而不治則泛濫東西漂泊南北日徙其民猶不足將何以安其生耶其曰多穿漕渠分殺水怒其說近是而又未知河之末流有必分之勢其曰隨决隨塞勞費無已為下策者誠哉是言也自漢而下决溢之患雖代有之而其經流至宋又千二百五十餘載始改於巨野尋又改于開封由禹距今上下三千七百餘載而河流三徙其瀆豈有不假人力之助而遂如斯安流耶方今明見如馮逡材敏如王延世謀議如李尋賈讓者豈乏其人我朝如馬和之郭若思引黃流由安山接御河相地設閘築隄皆能深知水性以成事功蓋亦不為無人舉而措之又何難焉臣以後學戇愚竊念生際盛明沐浴膏澤未有涓埃之報恆懷畎畝之憂覩黃河之橫流哀赤子之墊溺譬有病而必療寧無方之可施庸獻其一得之愚庶或助萬分之補捧漏巵沃焦釡謂宜莫急於此時歌瓠子築宣防端可追功於前代臣謹論治河圖略
